<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>PowerDown</title>
  <link rel="stylesheet" href="assets/vendor/flatpickr/flatpickr.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-bar">
    <h1 data-i18n="appTitle">Turn off the computer</h1>
    <div class="lang-select" id="lang-select">
      <button type="button" class="lang-trigger" id="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
        <img class="flag" id="lang-current-flag" alt="" />
        <span id="lang-current-name"></span>
        <span class="caret" aria-hidden="true">▾</span>
      </button>
      <ul class="lang-menu" id="lang-menu" role="listbox">
        <li role="option" data-lang="en"><img class="flag" src="assets/vendor/flags/us.svg" alt="" /><span>English</span></li>
        <li role="option" data-lang="uk"><img class="flag" src="assets/vendor/flags/ua.svg" alt="" /><span>Українська</span></li>
        <li role="option" data-lang="es"><img class="flag" src="assets/vendor/flags/es.svg" alt="" /><span>Español</span></li>
        <li role="option" data-lang="fr"><img class="flag" src="assets/vendor/flags/fr.svg" alt="" /><span>Français</span></li>
        <li role="option" data-lang="de"><img class="flag" src="assets/vendor/flags/de.svg" alt="" /><span>Deutsch</span></li>
      </ul>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="timer" data-i18n="tabTimer">In...</button>
    <button class="tab-btn" data-tab="schedule" data-i18n="tabSchedule">Scheduled</button>
  </div>

  <section id="tab-timer" class="tab-panel active">
    <div class="field">
      <label for="timer-duration" data-i18n="durationLabel">Time until shutdown (h : mm)</label>
      <input type="text" id="timer-duration" placeholder="00:30" />
      <p class="field-hint" data-i18n="timerHint">Up to 24 hours &mdash; for a later time, use Scheduled.</p>
    </div>
    <div class="quick-buttons">
      <button data-minutes="15" data-quick-index="0">15 min</button>
      <button data-minutes="30" data-quick-index="1">30 min</button>
      <button data-minutes="60" data-quick-index="2">1 h</button>
      <button data-minutes="120" data-quick-index="3">2 h</button>
    </div>
    <button id="start-timer" class="primary" data-i18n="startBtn">Schedule shutdown</button>
  </section>

  <section id="tab-schedule" class="tab-panel">
    <div class="field">
      <label for="schedule-datetime" data-i18n="dateTimeLabel">Date and time</label>
      <input type="text" id="schedule-datetime" placeholder="2026-07-14 23:30" />
    </div>
    <button id="start-schedule" class="primary" data-i18n="startBtn">Schedule shutdown</button>
  </section>

  <div id="status" class="status hidden">
    <p data-i18n="statusWillShutdown">The computer will shut down:</p>
    <p id="status-target"></p>
    <p id="status-countdown" class="countdown"></p>
    <button id="cancel-btn" class="danger" data-i18n="cancelBtn">Cancel</button>
  </div>

  <div class="setting-row">
    <label class="toggle">
      <input type="checkbox" id="auto-launch" />
      <span data-i18n="autoLaunch">Launch at system startup</span>
    </label>
  </div>

  <p class="hint" data-i18n="hint">Closing the window does not cancel the scheduled shutdown — the app will minimize to the tray.</p>

  <script src="assets/vendor/flatpickr/flatpickr.min.js"></script>
  <script src="assets/vendor/flatpickr/l10n/uk.js"></script>
  <script src="assets/vendor/flatpickr/l10n/es.js"></script>
  <script src="assets/vendor/flatpickr/l10n/fr.js"></script>
  <script src="assets/vendor/flatpickr/l10n/de.js"></script>
  <script src="dist/renderer.js"></script>
</body>
</html>
